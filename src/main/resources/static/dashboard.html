<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Sistema Institucional</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/styles.css" rel="stylesheet">
</head>
<body>

  <!-- ════════════════════════ DASHBOARD ════════════════════════ -->
  <div id="dashboard">

    <!-- Navbar / Header -->
    <nav class="app-navbar navbar px-3 d-flex align-items-center justify-content-between">
      <span class="navbar-brand mb-0">
        <i class="bi bi-building me-2"></i>Sistema Institucional Académico
      </span>
      <div class="d-flex align-items-center gap-3">
        <span class="small text-muted">
          Bienvenido, <strong id="hdrName" class="text-dark"></strong>
        </span>
        <button class="btn btn-outline-secondary btn-sm" onclick="logout()">
          <i class="bi bi-box-arrow-left me-1"></i>Cerrar sesión
        </button>
      </div>
    </nav>

    <!-- Sidebar + Contenido principal -->
    <div class="dashboard-body">
      <nav id="sidebar">
        <div id="sidebarItems" class="pt-2 pb-3"></div>
      </nav>
      <main id="mainContent" class="flex-grow-1"></main>
    </div>

    <!-- Footer -->
    <footer class="app-footer">
      <div class="d-flex align-items-center gap-2">
        <i class="bi bi-building"></i>
        <span class="fw-semibold">Sistema Institucional Académico</span>
      </div>
      <span>© 2025 — Todos los derechos reservados</span>
      <span>v1.0.0</span>
    </footer>

  </div>

  <!-- ══════════════════════════ MODAL ══════════════════════════ -->
  <div class="modal fade" id="crudModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-scrollable">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title fw-bold" id="modalTitle"></h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body" id="modalBody"></div>

        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-primary fw-semibold" id="btnSave" onclick="saveRecord()">
            <i class="bi bi-save me-1"></i>Guardar
          </button>
        </div>

      </div>
    </div>
  </div>

  <!-- Contenedor de toasts -->
  <div id="toastBox"></div>

  <!-- ══════════════════════ MODAL CONFIRMAR ELIMINAR ══════════════════════ -->
  <div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-sm modal-dialog-centered">
      <div class="modal-content delete-modal-content">
        <div class="modal-body text-center px-4 pt-4 pb-2">
          <div class="delete-icon-wrap mb-3">
            <i class="bi bi-exclamation-triangle-fill text-danger"></i>
          </div>
          <h6 class="fw-bold mb-1">¿Eliminar registro?</h6>
          <p class="text-muted small mb-0" id="deleteMsg"></p>
        </div>
        <div class="modal-footer border-0 justify-content-center gap-2 pb-4">
          <button class="btn btn-outline-secondary btn-sm px-4" data-bs-dismiss="modal">
            Cancelar
          </button>
          <button class="btn btn-danger btn-sm px-4 fw-semibold" id="btnConfirmDelete">
            <i class="bi bi-trash me-1"></i>Eliminar
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/dashboard.js"></script>

</body>
</html>
